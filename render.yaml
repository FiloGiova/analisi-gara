# Blueprint Render per FischioLab (backend Express + SPA, DB/Storage su Supabase).
# Su render.com: New → Blueprint → collega il repo FiloGiova/analisi-gara.
# I valori marcati `sync: false` NON stanno nel repo: si inseriscono nella
# dashboard Render (Environment) — sono gli stessi del .env locale.
services:
  - type: web
    name: fischiolab
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    # --include=dev serve per vite (build) anche con NODE_ENV=production.
    # NON usare --omit=optional: rollup distribuisce i suoi binari per-piattaforma
    # come optionalDependencies e servono a Vite. better-sqlite3 è anch'esso
    # optional: su Node 22 usa un binario precompilato, e se fallisse è non-fatale.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: DATABASE_SSL
        value: "true"
      - key: STORAGE_BUCKET
        value: rapporti
      - key: ENABLE_SCHEDULED_SYNC
        value: "true"
      - key: SCHEDULED_SYNC_TIME
        value: "13:15"
      - key: SCHEDULED_SYNC_TIMEZONE
        value: Europe/Rome
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Email agli arbitri. Sul piano Free di Render le porte SMTP in uscita
      # sono bloccate: usare Brevo (API HTTPS) impostando BREVO_API_KEY ed
      # EMAIL_FROM. Le variabili SMTP_* servono solo su istanze a pagamento
      # (o altrove) con EMAIL_DRIVER=smtp.
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_DRIVER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Opzionali (AI giudizio globale).
      - key: ENABLE_AI_FEATURES
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
